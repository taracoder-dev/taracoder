<nav class="navbar navbar-expand-lg navbar-light sticky-top" [ngClass]="{ scrolled: isScrolled }">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">
            <span class="logo">Taracoder</span>
        </a>
        <div class="navbar-controls">
            <button class="dark-mode-toggle" (click)="toggleDarkMode()" title="Toggle Dark Mode">
                {{ isDarkMode ? '☀️' : '🌙' }}
            </button>
            <button class="navbar-toggler" type="button" (click)="toggleNavbar()" [attr.aria-expanded]="!isNavCollapsed"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>
        <div class="navbar-collapse" [ngClass]="{ show: !isNavCollapsed }">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item" *ngFor="let link of navigationLinks">
                    <a class="nav-link" [routerLink]="link.route" routerLinkActive="active"
                        [routerLinkActiveOptions]="{ exact: true }" (click)="collapseNavbar()">
                        {{ link.label }}
                    </a>
                </li>
                <li class="nav-item ms-3">
                    <a class="nav-link cta-btn" href="#contact">Get Quote</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
